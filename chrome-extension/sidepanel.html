<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSCI AEM Publisher</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-title">
      <span class="header-logo">M</span>
      <span>AEM Publisher</span>
    </div>
    <div id="connection-status" class="status-dot disconnected" title="Not connected to AEM"></div>
  </header>

  <!-- Step Indicator -->
  <div id="steps-bar">
    <div class="step active clickable" data-step="1">
      <div class="step-number">1</div>
      <div class="step-label">Select</div>
    </div>
    <div class="step-line"></div>
    <div class="step" data-step="2">
      <div class="step-number">2</div>
      <div class="step-label">Process</div>
    </div>
    <div class="step-line"></div>
    <div class="step" data-step="3">
      <div class="step-number">3</div>
      <div class="step-label">Report</div>
    </div>
  </div>

  <!-- Validation overlay (shown after article select while we check AEM) -->
  <div id="validation-overlay" class="hidden">
    <div class="validation-overlay-card">
      <div class="validation-spinner"></div>
      <div id="validation-overlay-text">Checking AEM status...</div>
    </div>
  </div>

  <!-- Step 1: Article Selection -->
  <section id="step-1" class="step-content active">
    <div class="section-header">
      <h2>Select Article</h2>
      <button id="btn-refresh" class="btn-icon" title="Refresh articles">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A7.96 7.96 0 008 0C3.58 0 .01 3.58.01 8S3.58 16 8 16c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 018 14 6 6 0 012 8a6 6 0 016-6c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/></svg>
      </button>
    </div>
    <div id="articles-filter">
      <input type="text" id="search-input" placeholder="Search articles..." />
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="in-progress">In Progress</button>
        <button class="chip" data-filter="in-review">In Review</button>
        <button class="chip" data-filter="approved">Approved</button>
      </div>
    </div>
    <div id="articles-list">
      <div class="loading-spinner">Loading articles...</div>
    </div>
  </section>

  <!-- Step 2: Automated Process -->
  <section id="step-2" class="step-content">
    <button class="btn-back" id="btn-back-2">&larr; Back to articles</button>
    <div class="selected-article-header">
      <h2 id="process-title"></h2>
    </div>

    <div id="process-description" class="info-card process-desc-card"></div>

    <button id="btn-start-process" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polygon points="5,3 13,8 5,13" fill="currentColor"/></svg>
      Start process
    </button>

    <!-- Phase A: Assets -->
    <div class="phase-card" id="phase-assets">
      <div class="phase-header">
        <div class="phase-icon">A</div>
        <div class="phase-info">
          <h3>Assets &rarr; DAM</h3>
        </div>
      </div>
      <div class="phase-status"></div>
      <div id="conflict-assets" class="hidden"></div>
    </div>

    <!-- Phase B: Page -->
    <div class="phase-card" id="phase-page">
      <div class="phase-header">
        <div class="phase-icon">B</div>
        <div class="phase-info">
          <h3>Create Page</h3>
        </div>
      </div>
      <div class="phase-status"></div>
      <div id="conflict-page" class="hidden"></div>
    </div>

    <!-- Phase C: Content -->
    <div class="phase-card" id="phase-content">
      <div class="phase-header">
        <div class="phase-icon">C</div>
        <div class="phase-info">
          <h3>Inject Content</h3>
        </div>
      </div>
      <div class="phase-status"></div>
    </div>
  </section>

  <!-- Step 3: Report -->
  <section id="step-3" class="step-content">
    <button class="btn-back" id="btn-back-3">&larr; Back to process</button>
    <div class="selected-article-header">
      <h2>Publish Report</h2>
    </div>
    <div id="report-content"></div>
  </section>

  <!-- Global Log Panel (fixed bottom) -->
  <div id="global-log">
    <div id="global-log-toggle">
      <span>Logs</span>
      <span id="global-log-badge" class="log-badge hidden"></span>
    </div>
    <div id="global-log-content" class="console-log"></div>
  </div>

  <script type="module" src="sidepanel/index.js"></script>
</body>
</html>
